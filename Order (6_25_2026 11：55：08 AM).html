<script id="button-fix-script">
(function () {
  function buttonText(button) {
    return (button.textContent || '').replace(/\s+/g, ' ').trim().toLowerCase();
  }

  function setActive(buttons, activeButton) {
    buttons.forEach(function (btn) {
      var isActive = btn === activeButton;
      btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      btn.style.opacity = isActive ? '1' : '0.9';
    });
  }

  var buttons = Array.prototype.slice.call(document.querySelectorAll('button'));
  buttons.forEach(function (button) {
    button.disabled = false;
    button.removeAttribute('disabled');
    if (!button.hasAttribute('type')) {
      button.setAttribute('type', 'button');
    }
  });

  var backButton = buttons.find(function (btn) {
    return (btn.getAttribute('aria-label') || '').toLowerCase() === 'back';
  });

  if (backButton) {
    backButton.addEventListener('click', function () {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = '/';
      }
    });
  }

  var billingButtons = buttons.filter(function (btn) {
    var text = buttonText(btn);
    return text.indexOf('annual') !== -1 || text.indexOf('lifetime') !== -1;
  });

  billingButtons.forEach(function (button) {
    button.addEventListener('click', function () {
      setActive(billingButtons, button);
    });
  });

  var paymentButtons = buttons.filter(function (btn) {
    var text = buttonText(btn);
    return text === 'card' || text === 'apple pay' || text === 'more';
  });

  paymentButtons.forEach(function (button) {
    button.addEventListener('click', function () {
      setActive(paymentButtons, button);
    });
  });

  var payButton = buttons.find(function (btn) {
    return buttonText(btn) === 'pay';
  });

  if (payButton) {
    var form = payButton.closest('form');
    if (form) {
      form.addEventListener('submit', function (event) {
        event.preventDefault();
        var verifyDialog = document.querySelector('[role="dialog"][aria-label="Verify your payment"]');
        if (verifyDialog) {
          verifyDialog.hidden = false;
        }
      });
    }

    payButton.addEventListener('click', function () {
      if (form) {
        form.requestSubmit();
      }
    });
  }
})();
</script>
