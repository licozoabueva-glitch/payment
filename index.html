<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout UI Clone</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="left-panel">
        <div class="product">
          <div class="brand-row">
            <div class="logo">↗</div>
            <span class="brand">Polifly.io</span>
          </div>

          <p class="subtitle">Unlock Instant Access 🔑</p>

          <div class="price-block">
            <p class="muted">Subscribe to All Access</p>
            <h1>$1.00</h1>
          </div>

          <hr />

          <div class="total-row">
            <strong>Total due today</strong>
            <strong>$1.00</strong>
          </div>
        </div>
      </section>

      <section class="right-panel">
        <div class="checkout-card">
          <h2>Payment method</h2>

          <div class="card-box">
            <div class="card-header">💳 <strong>Card</strong></div>

            <label>Card information</label>
            <div class="input-group">
              <input type="text" placeholder="1234 1234 1234 1234" />
              <div class="row-2">
                <input type="text" placeholder="MM / YY" />
                <input type="text" placeholder="CVC" />
              </div>
            </div>

            <label>Billing details</label>
            <div class="input-group">
              <input type="text" placeholder="Name" />
              <select>
                <option>United States</option>
                <option>Philippines</option>
                <option>Canada</option>
                <option>United Kingdom</option>
              </select>
              <input type="text" placeholder="Address line 1" />
            </div>
          </div>

          <button class="subscribe-btn">Subscribe</button>

          <p class="terms">
            By subscribing, you agree to Polifly.io's terms and conditions.
          </p>

          <p class="footer-links">Powered by Whop &nbsp; | &nbsp; Terms &nbsp; Privacy</p>
        </div>
      </section>
    </main>
  </body>
</html>
