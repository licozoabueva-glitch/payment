<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Secure checkout page for your payment" />
    <title>Payment Checkout</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="left">
        <div class="summary-wrap">
          <div class="brand-row">
            <div class="brand-icon">P</div>
            <div class="brand-text">Payment</div>
          </div>

          <h1 class="headline">Secure checkout for your next purchase</h1>

          <div class="price-area">
            <p class="label">Amount due</p>
            <p class="price">$249.00</p>
          </div>

          <hr class="divider" />

          <div class="total-row">
            <span>Total</span>
            <strong>$249.00</strong>
          </div>
        </div>
      </section>

      <section class="right">
        <div class="checkout-wrap">
          <h2 class="section-title">Payment details</h2>

          <div class="panel">
            <div class="card-type">💳 <span>Credit card</span></div>

            <form>
              <label class="field-label" for="name">Cardholder name</label>
              <div class="field-box">
                <input id="name" name="name" type="text" placeholder="Jane Doe" required />
              </div>

              <label class="field-label" for="email">Email address</label>
              <div class="field-box">
                <input id="email" name="email" type="email" placeholder="jane@example.com" required />
              </div>

              <label class="field-label" for="card">Card number</label>
              <div class="field-box">
                <input id="card" name="card" type="text" inputmode="numeric" placeholder="4242 4242 4242 4242" required />
              </div>

              <div class="split-row">
                <div>
                  <label class="field-label" for="expiry">Expiry</label>
                  <div class="field-box">
                    <input id="expiry" name="expiry" type="text" placeholder="MM/YY" required />
                  </div>
                </div>
                <div>
                  <label class="field-label" for="cvc">CVC</label>
                  <div class="field-box">
                    <input id="cvc" name="cvc" type="text" inputmode="numeric" placeholder="123" required />
                  </div>
                </div>
              </div>

              <label class="field-label" for="country">Country</label>
              <div class="field-box select-wrap">
                <select id="country" name="country">
                  <option>United States</option>
                  <option>Canada</option>
                  <option>United Kingdom</option>
                  <option>Australia</option>
                </select>
                <span class="chevron">▾</span>
              </div>

              <button class="subscribe" type="submit">Pay now</button>
              <p class="terms-text">By continuing, you agree to our Terms and Privacy Policy.</p>
            </form>
          </div>
        </div>
      </section>
    </main>

    <div class="footer-row">
      <a href="#">Help</a>
      <span class="sep">•</span>
      <a href="#">Security</a>
      <span class="sep">•</span>
      <a href="#">Support</a>
    </div>
  </body>
</html>
