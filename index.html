<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="left">
        <div class="summary-wrap">
          <div class="brand-row">
            <div class="brand-icon">↗</div>
            <div class="brand-text">Polifly.io</div>
          </div>

          <h1 class="headline">Unlock Instant Access 🔑</h1>

          <div class="price-area">
            <p class="label">Subscribe to All Access</p>
            <p class="price">$1.00</p>
          </div>

          <hr class="divider" />

          <div class="total-row">
            <span>Total due today</span>
            <span>$1.00</span>
          </div>
        </div>
      </section>

      <section class="right">
        <div class="checkout-wrap">
          <h2 class="section-title">Payment method</h2>

          <div class="panel">
            <div class="card-type">💳 <strong>Card</strong></div>

            <label class="field-label">Card information</label>
            <div class="field-box">
              <input type="text" placeholder="1234 1234 1234 1234" />
              <div class="split-row">
                <input type="text" placeholder="MM / YY" />
                <input type="text" placeholder="CVC" />
              </div>
            </div>

            <label class="field-label">Billing details</label>
            <div class="field-box">
              <input type="text" placeholder="Name" />
              <div class="select-wrap">
                <select>
                  <option>United States</option>
                  <option>Philippines</option>
                  <option>Canada</option>
                  <option>United Kingdom</option>
                </select>
                <span class="chevron">⌄</span>
              </div>
              <input type="text" placeholder="Address line 1" />
            </div>
          </div>

          <button class="subscribe">Subscribe</button>

          <p class="terms-text">
            By subscribing, you agree to Polifly.io's terms and conditions.
          </p>

          <div class="footer-row">
            <span>Powered by</span>
            <strong>Whop</strong>
            <span class="sep">|</span>
            <a href="#">Terms</a>
            <a href="#">Privacy</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
